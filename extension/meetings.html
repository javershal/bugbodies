<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>bugbodies — meetings</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 820px; margin: 32px auto; padding: 0 20px; color: #1a1a1a; }
      h1 { font-size: 20px; }
      h2 { font-size: 15px; margin: 24px 0 6px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
      .meeting { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; flex-wrap: wrap; }
      .meta { flex: 1; min-width: 200px; }
      .when { font-weight: 600; }
      .sub { color: #777; font-size: 12px; }
      .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: .04em; }
      .recorded { background: #eef; color: #446; }
      .processing { background: #ffedcc; color: #8a5a00; }
      .complete { background: #e6f4ea; color: #1e7e34; }
      .error { background: #fdecea; color: #b00020; }
      button, a.btn { font-size: 12px; padding: 5px 10px; cursor: pointer; border: 1px solid #bbb; border-radius: 5px; background: #fafafa; color: inherit; text-decoration: none; }
      button:disabled { opacity: .5; cursor: default; }
      #banner { padding: 10px; border-radius: 6px; background: #fdecea; color: #b00020; margin-bottom: 16px; }
      .hidden { display: none; }
      .err-msg { color: #b00020; font-size: 12px; width: 100%; }
      .progress-wrap { width: 100%; }
      .progress { height: 6px; background: #f0e6d0; border-radius: 3px; overflow: hidden; margin-top: 4px; }
      .progress .bar { height: 100%; background: #f0a500; transition: width .4s ease; }
      .progress.indeterminate .bar { width: 40% !important; border-radius: 3px; animation: indet 1.2s ease-in-out infinite; }
      @keyframes indet { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
      .progress-label { font-size: 11px; color: #8a5a00; text-transform: capitalize; margin-top: 3px; }
      /* Developer mode */
      #devbar { margin: 4px 0 16px; }
      .dev-toggle { font-size: 12px; color: #777; cursor: pointer; user-select: none; }
      .dev-toggle input { vertical-align: -1px; margin-right: 5px; }
      #devpanel { margin-top: 10px; padding: 12px 14px; border: 1px dashed #bbb; border-radius: 6px; background: rgba(127,127,127,.06); }
      #devpanel .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      #devpanel label { font-size: 12px; font-weight: 600; }
      #devpanel input[type="number"] { width: 90px; font: inherit; font-size: 12px; padding: 4px 6px; border: 1px solid #bbb; border-radius: 5px; background: #fafafa; color: inherit; }
      #devpanel .hint { font-size: 11px; color: #888; width: 100%; margin-top: 4px; }
      button.danger { border-color: #e0a0a0; color: #b00020; }
      .dev-row-tag { font-size: 10px; color: #999; border: 1px solid #ddd; border-radius: 4px; padding: 1px 5px; }
    </style>
  </head>
  <body>
    <h1>Meetings</h1>
    <div id="devbar">
      <label class="dev-toggle"><input type="checkbox" id="devToggle" /> Developer mode</label>
      <div id="devpanel" class="hidden">
        <div class="row">
          <label for="splitGap">Split gap (ms):</label>
          <input type="number" id="splitGap" min="0" step="50" />
          <button id="splitGapReset" type="button">Reset to 700</button>
        </div>
        <div class="hint">
          Pause between a speaker's words that starts a new line. Lower = finer
          back-and-forth (risks over-splitting natural pauses); higher = longer,
          fewer lines. Applied when you Process / Reprocess. Default 700.
        </div>
      </div>
    </div>
    <div id="banner" class="hidden"></div>
    <div id="list"></div>
    <script src="meetings.js"></script>
  </body>
</html>
